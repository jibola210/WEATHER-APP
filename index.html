<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body class="sunny">

<div class="container">

    <div class="card login-card" id="loginCard">

        <h2>Weather Dashboard</h2>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="loginError"></p>

    </div>

    <div class="card weather-card hidden" id="weatherCard">

        <div class="top">

            <h2 id="city">Lagos</h2>

            <button onclick="logout()">Logout</button>

        </div>

        <div class="search">

            <input
                type="text"
                id="cityInput"
                placeholder="Search any city">

            <button onclick="getWeather()">

                <i class="fa fa-search"></i>

            </button>

        </div>

        <div class="icon">

            <i id="weatherIcon"
            class="fa-solid fa-sun"></i>

        </div>

        <h1 id="temperature">--°C</h1>

        <h3 id="condition">Search a city</h3>

        <div class="details">

            <div>

                <h2 id="humidity">--%</h2>

                <p>Humidity</p>

            </div>

            <div>

                <h2 id="wind">-- km/h</h2>

                <p>Wind</p>

            </div>

            <div>

                <h2 id="feels">--°C</h2>

                <p>Feels Like</p>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html><p id="date"></p><div class="temp-range">
    <span id="tempMax"></span>
    <span id="tempMin"></span>
</div>
<p id="sunrise"></p>
<p id="sunset"></p>
