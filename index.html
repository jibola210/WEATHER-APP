<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weatherly</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body class="sunny">

<div class="background-overlay"></div>

<div class="container">

<div class="weather-card">

<div class="top-bar">

<div>

<p class="today">Today</p>

<h1 id="city">Lagos</h1>

<p id="date">Monday, 30 June</p>

</div>

<button id="locationBtn" class="location-btn">

<i class="fa-solid fa-location-crosshairs"></i>

</button>

</div>

<div class="main-weather">

<div class="weather-icon">

<i id="weatherIcon" class="fa-solid fa-sun"></i>

</div>

<div class="temperature">

<h2 id="temperature">28°</h2>

<p id="condition">Sunny</p>

<p class="high-low">

H:
<span id="tempMax">31°</span>

&nbsp;&nbsp;

L:
<span id="tempMin">24°</span>

</p>

</div>

</div>

<div class="search-box">

<input
type="text"
id="cityInput"
placeholder="Search any city...">

<button id="searchBtn">

<i class="fa-solid fa-magnifying-glass"></i>

</button>

</div>

<p id="errorMessage"></p>

<div class="weather-grid">

<div class="info-card">

<i class="fa-solid fa-temperature-half"></i>

<h4>Feels Like</h4>

<p id="feels">--°</p>

</div>

<div class="info-card">

<i class="fa-solid fa-droplet"></i>

<h4>Humidity</h4>

<p id="humidity">--%</p>

</div>

<div class="info-card">

<i class="fa-solid fa-wind"></i>

<h4>Wind</h4>

<p id="wind">-- km/h</p>

</div>

<div class="info-card">

<i class="fa-solid fa-eye"></i>

<h4>Visibility</h4>

<p id="visibility">-- km</p>

</div>

<div class="info-card">

<i class="fa-solid fa-sun"></i>

<h4>Sunrise</h4>

<p id="sunrise">--:--</p>

</div>

<div class="info-card">

<i class="fa-solid fa-moon"></i>

<h4>Sunset</h4>

<p id="sunset">--:--</p>

</div>

</div>

<div class="forecast-section">

<h3>

<i class="fa-solid fa-clock"></i>

Hourly Forecast

</h3>

<div id="hourlyForecast" class="forecast-row">

<!-- JavaScript -->

</div>

</div>

<div class="forecast-section">

<h3>

<i class="fa-solid fa-calendar-days"></i>

5-Day Forecast

</h3>

<div id="dailyForecast" class="daily-list">

<!-- JavaScript -->

</div>

</div>

<div id="loader" class="loader hidden">

<div class="spinner"></div>

<p>Loading weather...</p>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
